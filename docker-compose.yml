version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: herrajes_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: herrajes_inventario
      POSTGRES_USER: herrajes_admin
      POSTGRES_PASSWORD: Herrajes2026!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herrajes_admin -d herrajes_inventario"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # pgAdmin - Interfaz visual para la BD
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: herrajes_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@herrajes.local
      PGADMIN_DEFAULT_PASSWORD: Admin2026!
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
