# ============================================================
# SISTEMA DE HERRAJES - Configuración Local (Desarrollo)
# ============================================================

# Puerto del servidor
server.port=8080

# ============================================================
# Base de Datos - PostgreSQL Local (Docker)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/herrajes_inventario
spring.datasource.username=herrajes_admin
spring.datasource.password=Herrajes2026!

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Configuración de logging
# ============================================================
logging.level.com.herrajes=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# Configuración de Email (SMTP local o servicio real)
# Opción 1: Mailtrap/Sandbox para desarrollo
# Opción 2: Gmail SMTP para producción
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-email@gmail.com
spring.mail.password=tu-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Configuración de archivos PDF
# ============================================================
app.cotizaciones.ruta-pdf=./pdf-cotizaciones/
app.cotizaciones.ruta-plantilla=classpath:templates/

# ============================================================
# URL base para Supabase (cuando se migre a producción)
# ============================================================
# app.supabase.url=https://tu-proyecto.supabase.co
# app.supabase.key=tu-anon-key

# ============================================================
# Configuración adicional
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
