<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones - Herrajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111827;display:flex}
        .sidebar{width:240px;height:100vh;background:#111827;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0}
        .sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .sidebar-brand h1{font-size:15px;font-weight:600;color:#f9fafb;display:flex;align-items:center;gap:10px}
        .sidebar-brand h1 span{font-size:18px}
        .sidebar-nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:1px}
        .sidebar-nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#9ca3af;text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent}
        .sidebar-nav a.active{background:rgba(99,102,241,.15);color:#fff;border-left-color:#6366f1}
        .sidebar-nav a .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
        .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#4b5563}
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        .topbar{background:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
        .topbar h2{font-size:17px;font-weight:600;color:#111827}
        .topbar-r{display:flex;align-items:center;gap:14px;font-size:13px;color:#6b7280}
.topbar-r .user-name{font-weight:500;color:var(--text)}
.topbar-r .btn-logout{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--text-sec);cursor:pointer}
.topbar-r .btn-logout:hover{border-color:var(--danger);color:var(--danger)}
        .tag{background:rgba(99,102,241,.1);color:#6366f1;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
        .content{padding:24px 28px;flex:1}
        .card{background:#fff;border-radius:10px;padding:22px;border:1px solid #e5e7eb;margin-bottom:18px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
        .card-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap}
        td{padding:11px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f9fafb}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .btn:hover{filter:brightness(1.08)}
        .btn-primary{background:#6366f1;color:#fff}
        .btn-success{background:#10b981;color:#fff}
        .btn-warning{background:#38bdf8;color:#fff}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
        .btn-remove{background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;padding:4px 9px;font-size:12px}
        .btn-remove:hover{filter:brightness(1.08)}
        .search-input{padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:260px;outline:none;background:#fff}
        .search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}
        .b-borrador{background:#dbeafe;color:#2563eb}
        .b-enviada{background:#fff7ed;color:#ea580c}
        .b-aprobada{background:#f0fdf4;color:#059669}
        .b-rechazada{background:#fef2f2;color:#dc2626}
        .b-vencida{background:#f3f4f6;color:#6b7280}
        .total{color:#6366f1;font-weight:700;font-size:14px}
        .acciones{display:flex;gap:6px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.4);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
        .modal.active{display:flex}
        .modal-content{background:#fff;border-radius:10px;padding:26px;width:90%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .modal-header h3{font-size:16px;font-weight:600}
        .modal-close{background:#f3f4f6;border:none;font-size:18px;cursor:pointer;color:#6b7280;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
        .modal-close:hover{background:#e5e7eb;color:#111827}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;margin-bottom:5px;font-size:13px;font-weight:600;color:#111827}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#fff}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
        .detalles-header{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px}
        .detalles-header h4{font-size:14px;font-weight:700}
        .detalle-grid{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 40px;gap:10px;margin-bottom:10px}
        .detalle-grid .label{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;padding-bottom:4px}
        .detalle-grid input,.detalle-grid select{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:100%;background:#fff;outline:none}
        .detalle-grid input:focus,.detalle-grid select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .totales-box{background:#f9fafb;padding:16px;border-radius:10px;margin-top:14px;border:1px solid #e5e7eb}
        .totales-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
        .totales-total{font-size:17px;font-weight:700;color:#6366f1;border-top:2px solid #6366f1;padding-top:10px;margin-top:10px}
        @media(max-width:768px){
            .sidebar{width:56px}
            .sidebar-brand h1 span:last-child,.sidebar-nav a span:last-child,.sidebar-footer{display:none}
            .sidebar-brand h1{justify-content:center}
            .sidebar-nav a{justify-content:center;padding:9px 0}
            .form-row{grid-template-columns:1fr}
            .detalle-grid{grid-template-columns:1fr 1fr}
            .detalle-grid>div:first-child{grid-column:1/-1}
        }
        @media(max-width:480px){
            .sidebar{width:44px}
            .detalle-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><h1><span>⚙</span><span>Herrajes</span></h1></div>
        <div class="sidebar-nav">
            <a href="/"><span class="ic">📊</span><span>Dashboard</span></a>
            <a href="/productos.html"><span class="ic">📦</span><span>Productos</span></a>
            <a href="/clientes.html"><span class="ic">👥</span><span>Clientes</span></a>
            <a href="/cotizaciones.html" class="active"><span class="ic">📄</span><span>Cotizaciones</span></a>
            <a href="/stock.html"><span class="ic">📉</span><span>Stock Crítico</span></a>
            <a href="/movimientos.html"><span class="ic">🔄</span><span>Movimientos</span></a>
        </div>
        <div class="sidebar-footer">v1.0 · 2026</div>
    </div>
    <div class="main">
        <div class="topbar">
            <h2>Cotizaciones</h2>
            <div class="topbar-r">
                <span class="user-name" id="userName"></span>
                <span class="tag" id="userRol"></span>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2>📄 Cotizaciones</h2>
                    <button class="btn btn-primary" onclick="abrirModal()">+ Nueva Cotización</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Cliente</th>
                            <th>Vendedor</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cotizaciones">
                        <tr><td colspan="7" style="text-align:center;padding:30px;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modalCotizacion">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nueva Cotización</h3>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <form id="formCotizacion" onsubmit="guardarCotizacion(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Cliente</label>
                        <select id="cliente_id" required></select>
                    </div>
                    <div class="form-group">
                        <label>Vendedor (Usuario)</label>
                        <select id="usuario_id" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Descuento (%)</label>
                        <input type="number" id="descuento" value="0" min="0" max="100" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>Notas</label>
                        <input type="text" id="notas" placeholder="Observaciones">
                    </div>
                </div>

                <div class="detalles-header">
                    <h4>Productos</h4>
                    <button type="button" class="btn btn-success btn-sm" onclick="agregarDetalle()">+ Agregar Producto</button>
                </div>
                <div id="detalles-container"></div>

                <div class="totales-box">
                    <div class="totales-row"><span>Subtotal:</span><span id="subtotal">$0.00</span></div>
                    <div class="totales-row"><span>IVA (16%):</span><span id="iva">$0.00</span></div>
                    <div class="totales-row totales-total"><span>TOTAL:</span><span id="total">$0.00</span></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-success">Crear Cotización</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                currentUser = await res.json();
                document.getElementById('userName').textContent = currentUser.nombre;
                document.getElementById('userRol').textContent = currentUser.rol;

                if (currentUser.rol === 'admin') {
                    const nav = document.querySelector('.sidebar-nav');
                    const link = document.createElement('a');
                    link.href = '/usuarios.html';
                    link.innerHTML = '<span class="ic">👤</span><span>Usuarios</span>';
                    nav.appendChild(link);
                }
            } catch (e) { window.location.href = '/login.html'; }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        let productos = [];
        let detalleCount = 0;

        async function cargar() {
            await checkAuth();
            const res = await fetch('/api/cotizaciones');
            const cotizaciones = await res.json();
            const tbody = document.getElementById('tabla-cotizaciones');

            if (cotizaciones.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">No hay cotizaciones. Crea una nueva.</td></tr>';
                return;
            }

            tbody.innerHTML = cotizaciones.map(c => `
                <tr>
                    <td><strong>${escapeHtml(c.numero)}</strong></td>
                    <td>${escapeHtml(c.cliente_nombre || '-')}</td>
                    <td>${escapeHtml(c.vendedor_nombre || '-')}</td>
                    <td>${new Date(c.fecha_cotizacion).toLocaleDateString('es-MX')}</td>
                    <td class="total">$${parseInt(c.total).toLocaleString()}</td>
                    <td><span class="badge b-${escapeHtml(c.estado)}">${escapeHtml(c.estado.toUpperCase())}</span></td>
                    <td>
                        ${c.estado === 'borrador' || c.estado === 'enviada' ?
                            `<a href="/api/cotizaciones/${c.id}/descargar-pdf" class="btn btn-danger btn-sm" download>Descargar PDF</a>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        async function cargarProductos() {
            const res = await fetch('/api/productos');
            productos = await res.json();
        }

        async function cargarClientes() {
            const res = await fetch('/api/clientes');
            const clientes = await res.json();
            const select = document.getElementById('cliente_id');
            select.innerHTML = '<option value="">Seleccionar cliente...</option>' +
                clientes.map(c => `<option value="${c.id}">${escapeHtml(c.nombre)}</option>`).join('');
        }

        async function cargarUsuarios() {
            const res = await fetch('/api/usuarios');
            const usuarios = await res.json();
            const select = document.getElementById('usuario_id');
            select.innerHTML = usuarios.map(u => `<option value="${u.user_id}">${escapeHtml(u.nombre_completo)} (${escapeHtml(u.rol)})</option>`).join('');
        }

        function abrirModal() {
            document.getElementById('modalCotizacion').classList.add('active');
            document.getElementById('detalles-container').innerHTML = '';
            detalleCount = 0;
            agregarDetalle();
        }

        function cerrarModal() {
            document.getElementById('modalCotizacion').classList.remove('active');
            document.getElementById('formCotizacion').reset();
        }

        function agregarDetalle() {
            const container = document.getElementById('detalles-container');
            const id = detalleCount++;
            const options = productos.map(p => `<option value="${p.id}" data-precio="${p.precio_venta}">${escapeHtml(p.codigo)} - ${escapeHtml(p.nombre)} | $${parseInt(p.precio_venta).toLocaleString()} | Stock: ${p.stock_actual}</option>`).join('');

            const html = `
                <div class="detalle-grid" id="detalle-${id}">
                    <div>
                        ${id === 0 ? '<div class="label">Producto</div>' : ''}
                        <select class="detalle-producto" onchange="calcularTotales()">
                            <option value="">Seleccionar...</option>
                            ${options}
                        </select>
                    </div>
                    <div>
                        ${id === 0 ? '<div class="label">Cantidad</div>' : ''}
                        <input type="number" class="detalle-cantidad" value="1" min="1" oninput="calcularTotales()">
                    </div>
                    <div>
                        ${id === 0 ? '<div class="label">Descuento %</div>' : ''}
                        <input type="number" class="detalle-descuento" value="0" min="0" max="100" oninput="calcularTotales()">
                    </div>
                    <div>
                        ${id === 0 ? '<div class="label">Subtotal</div>' : ''}
                        <span class="detalle-subtotal" style="padding:8px;display:block;">$0</span>
                    </div>
                    <div>
                        ${id === 0 ? '<div class="label">&nbsp;</div>' : ''}
                        <button type="button" class="btn-remove" onclick="eliminarDetalle(${id})">X</button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function eliminarDetalle(id) {
            document.getElementById(`detalle-${id}`).remove();
            calcularTotales();
        }

        function calcularTotales() {
            let subtotal = 0;
            document.querySelectorAll('.detalle-grid').forEach(row => {
                const select = row.querySelector('.detalle-producto');
                const cantidad = parseInt(row.querySelector('.detalle-cantidad').value) || 0;
                const descuento = parseFloat(row.querySelector('.detalle-descuento').value) || 0;
                const option = select.options[select.selectedIndex];
                const precio = parseFloat(option?.dataset?.precio) || 0;

                const lineaSubtotal = Math.round(precio * cantidad * (1 - descuento / 100));
                row.querySelector('.detalle-subtotal').textContent = `$${lineaSubtotal.toLocaleString()}`;
                subtotal += lineaSubtotal;
            });

            const iva = Math.round(subtotal * 0.16);
            const total = subtotal + iva;

            document.getElementById('subtotal').textContent = `$${subtotal.toLocaleString()}`;
            document.getElementById('iva').textContent = `$${iva.toLocaleString()}`;
            document.getElementById('total').textContent = `$${total.toLocaleString()}`;
        }

        async function guardarCotizacion(e) {
            e.preventDefault();

            const detalles = [];
            document.querySelectorAll('.detalle-grid').forEach(row => {
                const productoId = row.querySelector('.detalle-producto').value;
                const cantidad = parseInt(row.querySelector('.detalle-cantidad').value) || 0;
                const descuento = parseFloat(row.querySelector('.detalle-descuento').value) || 0;
                if (productoId && cantidad > 0) {
                    detalles.push({ producto_id: productoId, cantidad, descuento_porcentaje: descuento });
                }
            });

            if (detalles.length === 0) {
                alert('Agrega al menos un producto');
                return;
            }

            const data = {
                cliente_id: document.getElementById('cliente_id').value,
                usuario_id: document.getElementById('usuario_id').value,
                descuento_porcentaje: document.getElementById('descuento').value || 0,
                notas: document.getElementById('notas').value,
                detalles
            };

            try {
                const res = await fetch('/api/cotizaciones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Cotización creada exitosamente');
                    cerrarModal();
                    cargar();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (e) {
                alert('Error al guardar');
            }
        }

        cargar();
        cargarProductos();
        cargarClientes();
        cargarUsuarios();
    </script>
    <script>document.getElementById('fecha').textContent=new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});</script>
</body>
</html>
