<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema de Herrajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--sidebar-bg:#111827;--sidebar-text:#9ca3af;--sidebar-active:#6366f1;--primary:#6366f1;--primary-hover:#4f46e5;--success:#10b981;--warning:#38bdf8;--danger:#ef4444;--text:#111827;--text-sec:#6b7280;--border:#e5e7eb;--bg:#f9fafb;--card:#fff;--radius:10px}
        html,body{height:100%}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;-webkit-font-smoothing:antialiased}
        .sidebar{width:240px;height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0}
        .sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .sidebar-brand h1{font-size:15px;font-weight:600;color:#f9fafb;display:flex;align-items:center;gap:10px}
        .sidebar-brand h1 span{font-size:18px}
        .sidebar-nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:1px}
        .sidebar-nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--sidebar-text);text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent}
        .sidebar-nav a.active{background:rgba(99,102,241,.15);color:#fff;border-left-color:var(--sidebar-active)}
        .sidebar-nav a .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
        .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#4b5563}
        .main{flex:1;min-width:0;display:flex;flex-direction:column}
        .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
        .topbar h2{font-size:16px;font-weight:600}
        .topbar-r{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text-sec)}
        .topbar-r .tag{background:rgba(99,102,241,.1);color:var(--primary);padding:3px 10px;border-radius:16px;font-weight:600;font-size:11px}
        .topbar-r .user-name{font-weight:500;color:var(--text)}
        .topbar-r .btn-logout{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--text-sec);cursor:pointer}
        .topbar-r .btn-logout:hover{border-color:var(--danger);color:var(--danger)}
        .content{padding:24px 28px;flex:1}
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
        .card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .card-h h2{font-size:15px;font-weight:600}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);border-bottom:1px solid var(--border);white-space:nowrap}
        td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f9fafb}
        .badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}
        .b-admin{background:#ede9fe;color:#7c3aed}
        .b-ventas{background:#dbeafe;color:#2563eb}
        .b-bodega{background:#fef3c7;color:#d97706}
        .b-compras{background:#d1fae5;color:#059669}
        .b-consulta{background:#f3f4f6;color:#6b7280}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .btn:hover{filter:brightness(1.08)}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
        .acciones{display:flex;gap:6px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.4);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
        .modal.active{display:flex}
        .modal-content{background:#fff;border-radius:var(--radius);padding:24px;width:90%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-header h3{font-size:16px;font-weight:600}
        .modal-close{background:#f3f4f6;border:none;font-size:18px;cursor:pointer;color:var(--text-sec);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
        .modal-close:hover{background:#e5e7eb}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;margin-bottom:5px;font-size:13px;font-weight:500;color:var(--text)}
        .form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff}
        .form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
        .toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:2000;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
        .toast.show{display:block;animation:slideIn .3s ease}
        .toast-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
        .toast-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:768px){.sidebar{width:56px}.sidebar-brand h1 span:last-child{display:none}.sidebar-nav a span:last-child{display:none}.sidebar-footer{display:none}.content{padding:16px}.topbar{padding:12px 16px}.form-row{grid-template-columns:1fr}}
        @media(max-width:480px){.sidebar{width:44px}.sidebar-brand{padding:14px 8px}.sidebar-nav{padding:8px 4px}.sidebar-nav a{padding:8px;justify-content:center}}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><h1><span>⚙</span><span>Herrajes</span></h1></div>
        <div class="sidebar-nav">
            <a href="/"><span class="ic">📊</span><span>Dashboard</span></a>
            <a href="/productos.html"><span class="ic">📦</span><span>Productos</span></a>
            <a href="/clientes.html"><span class="ic">👥</span><span>Clientes</span></a>
            <a href="/cotizaciones.html"><span class="ic">📄</span><span>Cotizaciones</span></a>
            <a href="/stock.html"><span class="ic">📉</span><span>Stock Crítico</span></a>
            <a href="/movimientos.html"><span class="ic">🔄</span><span>Movimientos</span></a>
            <a href="/usuarios.html" class="active"><span class="ic">👤</span><span>Usuarios</span></a>
        </div>
        <div class="sidebar-footer">v1.0 · 2026</div>
    </div>
    <div class="main">
        <div class="topbar">
            <h2>Gestión de Usuarios</h2>
            <div class="topbar-r">
                <span class="user-name" id="userName"></span>
                <span class="tag" id="userRol"></span>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-h">
                    <h2>Usuarios del Sistema</h2>
                    <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo Usuario</button>
                </div>
                <table>
                    <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="tabla"><tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-sec)">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Usuario</h3>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <form id="formUser">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" id="nombre" required placeholder="Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required placeholder="juan@correo.com">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Contraseña <small id="passHint">(dejar vacío para no cambiar)</small></label>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select id="rol">
                            <option value="consulta">Consulta</option>
                            <option value="ventas">Ventas</option>
                            <option value="bodega">Bodega</option>
                            <option value="compras">Compras</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono" placeholder="81-1234-5678">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger btn-sm" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                currentUser = await res.json();
                document.getElementById('userName').textContent = currentUser.nombre;
                document.getElementById('userRol').textContent = currentUser.rol;

                if (currentUser.rol !== 'admin') {
                    document.querySelector('.card-h').innerHTML = '<h2>Usuarios del Sistema</h2>';
                }

                cargarUsuarios();
            } catch (e) { window.location.href = '/login.html'; }
        }

        async function cargarUsuarios() {
            try {
                const res = await fetch('/api/usuarios');
                if (!res.ok) throw new Error('Error al cargar');
                const users = await res.json();
                const tbody = document.getElementById('tabla');

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-sec)">Sin usuarios</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => {
                    const rolClass = 'b-' + u.rol;
                    const estado = u.activo ? '<span style="color:#16a34a">Activo</span>' : '<span style="color:#dc2626">Inactivo</span>';
                    const isAdmin = currentUser && currentUser.rol === 'admin';
                    const actions = isAdmin ? `
                        <div class="acciones">
                            <button class="btn btn-primary btn-sm" onclick="editarUsuario('${u.id}','${escapeHtml(u.nombre).replace(/'/g, "\\'")}','${escapeHtml(u.email).replace(/'/g, "\\'")}','${u.rol}','${escapeHtml(u.telefono||'').replace(/'/g, "\\'")}')">Editar</button>
                            ${u.id !== currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="eliminarUsuario('${u.id}')">Eliminar</button>` : ''}
                        </div>` : '-';
                    return `<tr>
                        <td><strong>${escapeHtml(u.nombre)}</strong></td>
                        <td>${escapeHtml(u.email)}</td>
                        <td><span class="badge ${rolClass}">${escapeHtml(u.rol)}</span></td>
                        <td>${estado}</td>
                        <td>${actions}</td>
                    </tr>`;
                }).join('');
            } catch (e) { showToast(e.message, 'error'); }
        }

        function abrirModal(edit = false) {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalTitle').textContent = edit ? 'Editar Usuario' : 'Nuevo Usuario';
            document.getElementById('passHint').style.display = edit ? 'inline' : 'none';
            document.getElementById('password').required = !edit;
        }

        function cerrarModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('formUser').reset();
            document.getElementById('userId').value = '';
        }

        function editarUsuario(id, nombre, email, rol, telefono) {
            document.getElementById('userId').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('email').value = email;
            document.getElementById('rol').value = rol;
            document.getElementById('telefono').value = telefono;
            document.getElementById('password').value = '';
            document.getElementById('password').required = false;
            abrirModal(true);
        }

        document.getElementById('formUser').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const body = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                rol: document.getElementById('rol').value,
                telefono: document.getElementById('telefono').value
            };
            const password = document.getElementById('password').value;
            if (password) body.password = password;

            try {
                const url = id ? `/api/usuarios/${id}` : '/api/usuarios';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showToast(id ? 'Usuario actualizado' : 'Usuario creado', 'success');
                cerrarModal();
                cargarUsuarios();
            } catch (e) { showToast(e.message, 'error'); }
        });

        async function eliminarUsuario(id) {
            if (!confirm('¿Desactivar este usuario?')) return;
            try {
                const res = await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showToast('Usuario desactivado', 'success');
                cargarUsuarios();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast-' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
