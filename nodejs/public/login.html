<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Herrajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
        .login-wrap{width:100%;max-width:380px;padding:20px}
        .login-brand{text-align:center;margin-bottom:32px}
        .login-brand h1{font-size:22px;font-weight:700;color:#111827;display:flex;align-items:center;justify-content:center;gap:10px}
        .login-brand h1 span{font-size:24px}
        .login-brand p{font-size:13px;color:#6b7280;margin-top:6px}
        .login-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .login-card h2{font-size:16px;font-weight:600;margin-bottom:20px;color:#111827}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
        .form-group input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s}
        .form-group input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .btn-login{width:100%;padding:10px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:filter .15s}
        .btn-login:hover{filter:brightness(1.08)}
        .btn-login:disabled{opacity:.6;cursor:not-allowed}
        .error-msg{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
        .error-msg.show{display:block}
        .login-footer{text-align:center;margin-top:20px;font-size:12px;color:#9ca3af}
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <h1><span>⚙</span> Herrajes</h1>
            <p>Sistema de Inventario y Cotizaciones</p>
        </div>
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <div class="error-msg" id="error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required placeholder="admin@herrajes.local" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Ingresar</button>
            </form>
        </div>
        <div class="login-footer">Sistema de Herrajes v1.0 · 2026</div>
    </div>

    <script>
        // Si ya está logueado, redirigir al dashboard
        fetch('/api/auth/me').then(r => {
            if (r.ok) window.location.href = '/';
        }).catch(() => {});

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const error = document.getElementById('error');
            error.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    error.textContent = data.error || 'Error al iniciar sesión';
                    error.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'Ingresar';
                    return;
                }

                window.location.href = '/';
            } catch (err) {
                error.textContent = 'Error de conexión';
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
