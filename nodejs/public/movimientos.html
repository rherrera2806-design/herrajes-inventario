<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos de Stock - Herrajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111827;display:flex}
        .sidebar{width:240px;height:100vh;background:#111827;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0}
        .sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .sidebar-brand h1{font-size:15px;font-weight:600;color:#f9fafb;display:flex;align-items:center;gap:10px}
        .sidebar-brand h1 span{font-size:18px}
        .sidebar-nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:1px}
        .sidebar-nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#9ca3af;text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent}
        .sidebar-nav a.active{background:rgba(99,102,241,.15);color:#fff;border-left-color:#6366f1}
        .sidebar-nav a .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
        .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#4b5563}
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        .topbar{background:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
        .topbar h2{font-size:17px;font-weight:600;color:#111827}
        .topbar-r{display:flex;align-items:center;gap:14px;font-size:13px;color:#6b7280}
.topbar-r .user-name{font-weight:500;color:var(--text)}
.topbar-r .btn-logout{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--text-sec);cursor:pointer}
.topbar-r .btn-logout:hover{border-color:var(--danger);color:var(--danger)}
        .tag{background:rgba(99,102,241,.1);color:#6366f1;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
        .content{padding:24px 28px;flex:1}
        .card{background:#fff;border-radius:10px;padding:22px;border:1px solid #e5e7eb;margin-bottom:18px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
        .card-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap}
        td{padding:11px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f9fafb}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .btn:hover{filter:brightness(1.08)}
        .btn-primary{background:#6366f1;color:#fff}
        .btn-success{background:#10b981;color:#fff}
        .btn-warning{background:#38bdf8;color:#fff}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
        .btn-group{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .search-input{padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:260px;outline:none;background:#fff}
        .search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}
        .b-entrada{background:#f0fdf4;color:#059669}
        .b-salida{background:#fef2f2;color:#dc2626}
        .cantidad-entrada{color:#10b981;font-weight:700}
        .cantidad-salida{color:#ef4444;font-weight:700}
        .acciones{display:flex;gap:6px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.4);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
        .modal.active{display:flex}
        .modal-content{background:#fff;border-radius:10px;padding:26px;width:90%;max-width:450px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .modal-header h3{font-size:16px;font-weight:600}
        .modal-close{background:#f3f4f6;border:none;font-size:18px;cursor:pointer;color:#6b7280;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
        .modal-close:hover{background:#e5e7eb;color:#111827}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;margin-bottom:5px;font-size:13px;font-weight:600;color:#111827}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#fff}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
        .stock-info{background:#f9fafb;padding:12px;border-radius:10px;margin-top:10px;font-size:12px;border:1px solid #e5e7eb}
        @media(max-width:768px){
            .sidebar{width:56px}
            .sidebar-brand h1 span:last-child,.sidebar-nav a span:last-child,.sidebar-footer{display:none}
            .sidebar-brand h1{justify-content:center}
            .sidebar-nav a{justify-content:center;padding:9px 0}
        }
        @media(max-width:480px){
            .btn-group{flex-direction:column;align-items:stretch}
            .btn-group .btn{width:100%;justify-content:center}
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><h1><span>⚙</span><span>Herrajes</span></h1></div>
        <div class="sidebar-nav">
            <a href="/"><span class="ic">📊</span><span>Dashboard</span></a>
            <a href="/productos.html"><span class="ic">📦</span><span>Productos</span></a>
            <a href="/clientes.html"><span class="ic">👥</span><span>Clientes</span></a>
            <a href="/cotizaciones.html"><span class="ic">📄</span><span>Cotizaciones</span></a>
            <a href="/stock.html"><span class="ic">📉</span><span>Stock Crítico</span></a>
            <a href="/movimientos.html" class="active"><span class="ic">🔄</span><span>Movimientos</span></a>
        </div>
        <div class="sidebar-footer">v1.0 · 2026</div>
    </div>
    <div class="main">
        <div class="topbar">
            <h2>Movimientos</h2>
            <div class="topbar-r">
                <span class="user-name" id="userName"></span>
                <span class="tag" id="userRol"></span>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2>📋 Historial de Movimientos</h2>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="abrirModal('entrada')">➕ Entrada de Stock</button>
                        <button class="btn btn-danger" onclick="abrirModal('salida')">➖ Salida de Stock</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Tipo</th>
                            <th>Cantidad</th>
                            <th>Motivo</th>
                            <th>Referencia</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-movimientos">
                        <tr><td colspan="7" style="text-align:center;padding:30px;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modalMovimiento">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Entrada de Stock</h3>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <form id="formMovimiento" onsubmit="guardarMovimiento(event)">
                <input type="hidden" id="tipo_movimiento">
                <div class="form-group">
                    <label>Producto</label>
                    <select id="producto_id" required onchange="mostrarStock()"></select>
                    <div class="stock-info" id="stock-info" style="display:none;">
                        Stock actual: <strong id="stock-actual">0</strong> |
                        Mínimo: <strong id="stock-minimo">0</strong>
                    </div>
                </div>
                <div class="form-group">
                    <label>Cantidad</label>
                    <input type="number" id="cantidad" min="1" required placeholder="Cantidad">
                </div>
                <div class="form-group">
                    <label>Motivo</label>
                    <select id="motivo" required>
                        <option value="">Seleccionar...</option>
                        <optgroup label="Entradas" id="motivos-entrada">
                            <option value="Compra a proveedor">Compra a proveedor</option>
                            <option value="Devolución de cliente">Devolución de cliente</option>
                            <option value="Ajuste positivo">Ajuste positivo</option>
                            <option value="Inventario inicial">Inventario inicial</option>
                        </optgroup>
                        <optgroup label="Salidas" id="motivos-salida">
                            <option value="Venta">Venta</option>
                            <option value="Devolución a proveedor">Devolución a proveedor</option>
                            <option value="Ajuste negativo">Ajuste negativo</option>
                            <option value="Daño/Pérdida">Daño/Pérdida</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Referencia (opcional)</label>
                    <input type="text" id="referencia" placeholder="N° factura, orden, etc.">
                </div>
                <div class="form-group">
                    <label>Notas (opcional)</label>
                    <textarea id="notas" rows="2" placeholder="Observaciones"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-success" id="btn-guardar">Registrar Entrada</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                currentUser = await res.json();
                document.getElementById('userName').textContent = currentUser.nombre;
                document.getElementById('userRol').textContent = currentUser.rol;

                if (currentUser.rol === 'admin') {
                    const nav = document.querySelector('.sidebar-nav');
                    const link = document.createElement('a');
                    link.href = '/usuarios.html';
                    link.innerHTML = '<span class="ic">👤</span><span>Usuarios</span>';
                    nav.appendChild(link);
                }
            } catch (e) { window.location.href = '/login.html'; }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        let productos = [];

        async function cargar() {
            await checkAuth();
            const res = await fetch('/api/stock/movimientos');
            const movimientos = await res.json();
            const tbody = document.getElementById('tabla-movimientos');

            if (movimientos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">No hay movimientos registrados</td></tr>';
                return;
            }

            tbody.innerHTML = movimientos.map(m => `
                <tr>
                    <td>${new Date(m.created_at).toLocaleString('es-MX')}</td>
                    <td><strong>${escapeHtml(m.codigo)}</strong></td>
                    <td>${escapeHtml(m.producto_nombre)}</td>
                    <td><span class="badge b-${escapeHtml(m.tipo_movimiento)}">${escapeHtml(m.tipo_movimiento.toUpperCase())}</span></td>
                    <td class="cantidad-${escapeHtml(m.tipo_movimiento)}">${m.tipo_movimiento === 'entrada' ? '+' : '-'}${m.cantidad}</td>
                    <td>${escapeHtml(m.motivo)}</td>
                    <td>${escapeHtml(m.referencia || '-')}</td>
                </tr>
            `).join('');
        }

        async function cargarProductos() {
            const res = await fetch('/api/productos');
            productos = await res.json();
            const select = document.getElementById('producto_id');
            select.innerHTML = '<option value="">Seleccionar producto...</option>' +
                productos.map(p => `<option value="${p.id}" data-stock="${p.stock_actual}" data-minimo="${p.stock_minimo}">${escapeHtml(p.codigo)} - ${escapeHtml(p.nombre)} (Stock: ${p.stock_actual})</option>`).join('');
        }

        function abrirModal(tipo) {
            document.getElementById('modalMovimiento').classList.add('active');
            document.getElementById('tipo_movimiento').value = tipo;
            document.getElementById('modal-title').textContent = tipo === 'entrada' ? 'Entrada de Stock' : 'Salida de Stock';
            document.getElementById('btn-guardar').textContent = tipo === 'entrada' ? 'Registrar Entrada' : 'Registrar Salida';
            document.getElementById('btn-guardar').className = tipo === 'entrada' ? 'btn btn-success' : 'btn btn-danger';

            document.getElementById('motivos-entrada').style.display = tipo === 'entrada' ? '' : 'none';
            document.getElementById('motivos-salida').style.display = tipo === 'salida' ? '' : 'none';
            document.getElementById('motivo').value = '';

            document.getElementById('formMovimiento').reset();
            document.getElementById('tipo_movimiento').value = tipo;
        }

        function cerrarModal() {
            document.getElementById('modalMovimiento').classList.remove('active');
        }

        function mostrarStock() {
            const select = document.getElementById('producto_id');
            const option = select.options[select.selectedIndex];
            if (option && option.value) {
                document.getElementById('stock-info').style.display = 'block';
                document.getElementById('stock-actual').textContent = option.dataset.stock;
                document.getElementById('stock-minimo').textContent = option.dataset.minimo;
            } else {
                document.getElementById('stock-info').style.display = 'none';
            }
        }

        async function guardarMovimiento(e) {
            e.preventDefault();
            const tipo = document.getElementById('tipo_movimiento').value;

            const data = {
                producto_id: document.getElementById('producto_id').value,
                cantidad: document.getElementById('cantidad').value,
                motivo: document.getElementById('motivo').value,
                referencia: document.getElementById('referencia').value,
                notas: document.getElementById('notas').value
            };

            try {
                const res = await fetch(`/api/stock/${tipo}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert(`${tipo === 'entrada' ? 'Entrada' : 'Salida'} registrada exitosamente`);
                    cerrarModal();
                    cargar();
                    cargarProductos();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (e) {
                alert('Error al guardar');
            }
        }

        cargar();
        cargarProductos();
    </script>
    <script>document.getElementById('fecha').textContent=new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});</script>
</body>
</html>
